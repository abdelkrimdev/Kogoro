<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kogoro</title>
  <script type="module" src="./index.ts"></script>
</head>
<body class="bg-surface-900 text-surface-50 h-screen overflow-hidden">
  <div class="h-full flex flex-col">
    <div id="app-shell" class="flex-1 flex overflow-hidden">
      <aside class="w-64 bg-surface-800 border-r border-surface-700 flex flex-col pt-12">
        <nav class="flex-1 p-2 space-y-1">
          <button data-nav="scan" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-surface-400 hover:text-surface-200 hover:bg-surface-700/50 transition-colors">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            Scan
          </button>
          <button data-nav="library" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-surface-400 hover:text-surface-200 hover:bg-surface-700/50 transition-colors">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
            Library
          </button>
          <button data-nav="settings" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-surface-400 hover:text-surface-200 hover:bg-surface-700/50 transition-colors">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            Settings
          </button>
        </nav>
      </aside>
      <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-12 flex items-center px-4 border-b border-surface-700 bg-surface-800/50" style="-webkit-app-region: drag;">
          <span class="text-sm font-medium text-surface-400">Kogoro</span>
        </header>
        <div id="content" class="flex-1 overflow-auto"></div>
      </main>
    </div>
    <footer class="h-8 flex items-center px-4 border-t border-surface-700 bg-surface-800">
      <span id="status-text" class="text-xs text-surface-500">Ready</span>
    </footer>
  </div>
  <script>
    document.querySelectorAll("[data-nav]").forEach((el) => {
      el.addEventListener("click", () => {
        const nav = el.getAttribute("data-nav");
        window.dispatchEvent(new CustomEvent("kogoro:navigate", { detail: { view: nav } }));
      });
    });
  </script>
</body>
</html>
