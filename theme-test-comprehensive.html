<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kogoro Theme Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .theme-indicator {
            transition: all 0.3s ease;
        }
        .test-section {
            padding: 2rem;
            margin: 1rem 0;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .light-theme {
            background: white;
            color: #1f2937;
        }
        .dark-theme {
            background: #1f2937;
            color: white;
        }
        .auto-theme {
            background: linear-gradient(45deg, #3b82f6, #8b5cf6);
            color: white;
        }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Kogoro Theme Functionality Test</h1>
        
        <div class="mb-8">
            <h2 class="text-xl font-semibold mb-4">Test Results</h2>
            <div id="test-results" class="space-y-2"></div>
        </div>

        <div class="mb-8">
            <h2 class="text-xl font-semibold mb-4">Theme Controls</h2>
            <div class="flex gap-4 mb-4">
                <button onclick="testTheme('light')" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                    Test Light Theme
                </button>
                <button onclick="testTheme('dark')" class="px-4 py-2 bg-gray-800 text-white rounded hover:bg-gray-900">
                    Test Dark Theme
                </button>
                <button onclick="testTheme('auto')" class="px-4 py-2 bg-purple-500 text-white rounded hover:bg-purple-600">
                    Test Auto Theme
                </button>
                <button onclick="testPersistence()" class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600">
                    Test Persistence
                </button>
            </div>
        </div>

        <div class="mb-8">
            <h2 class="text-xl font-semibold mb-4">Current Theme Status</h2>
            <div id="theme-status" class="test-section light-theme">
                <p><strong>Document Classes:</strong> <span id="doc-classes"></span></p>
                <p><strong>System Theme:</strong> <span id="system-theme"></span></p>
                <p><strong>Current Theme:</strong> <span id="current-theme"></span></p>
                <p><strong>Effective Theme:</strong> <span id="effective-theme"></span></p>
                <p><strong>Local Storage:</strong> <span id="storage-theme"></span></p>
            </div>
        </div>

        <div class="mb-8">
            <h2 class="text-xl font-semibold mb-4">Live Preview</h2>
            <div id="preview" class="test-section light-theme">
                <h3 class="text-lg font-semibold mb-2">Preview Area</h3>
                <p>This area shows the current theme appearance.</p>
                <div class="mt-4 p-4 border rounded">
                    <p>Sample text content</p>
                    <button class="mt-2 px-3 py-1 bg-blue-500 text-white rounded">Sample Button</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Test configuration
        const SERVER_URL = 'http://localhost:3001';
        let testResults = {
            defaultTheme: false,
            themeSwitching: false,
            themePersistence: false,
            allThemesApply: false,
            errors: []
        };

        // Utility functions
        function updateThemeStatus() {
            const docClasses = document.documentElement.className;
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            const storageTheme = localStorage.getItem('kogoro-theme');
            
            document.getElementById('doc-classes').textContent = docClasses || 'none';
            document.getElementById('system-theme').textContent = systemTheme;
            document.getElementById('current-theme').textContent = storageTheme || 'none';
            document.getElementById('effective-theme').textContent = docClasses.includes('dark') ? 'dark' : 'light';
            document.getElementById('storage-theme').textContent = storageTheme || 'none';
            
            // Update preview theme
            const preview = document.getElementById('preview');
            const status = document.getElementById('theme-status');
            
            if (docClasses.includes('dark')) {
                preview.className = 'test-section dark-theme';
                status.className = 'test-section dark-theme';
            } else {
                preview.className = 'test-section light-theme';
                status.className = 'test-section light-theme';
            }
        }

        function addTestResult(test, passed, message = '') {
            const resultsDiv = document.getElementById('test-results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `p-3 rounded ${passed ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`;
            resultDiv.innerHTML = `
                <strong>${test}:</strong> ${passed ? 'PASS' : 'FAIL'}
                ${message ? `<br><small>${message}</small>` : ''}
            `;
            resultsDiv.appendChild(resultDiv);
            
            testResults[test] = passed;
            if (!passed && message) {
                testResults.errors.push(message);
            }
        }

        async function makeRequest(url) {
            try {
                const response = await fetch(url);
                return {
                    ok: response.ok,
                    status: response.status,
                    text: await response.text()
                };
            } catch (error) {
                throw new Error(`Request failed: ${error.message}`);
            }
        }

        async function testTheme(theme) {
            console.log(`Testing ${theme} theme...`);
            
            try {
                // Test server response with theme parameter
                const response = await makeRequest(`${SERVER_URL}/?theme=${theme}`);
                
                if (response.ok) {
                    addTestResult(`Theme Switch (${theme})`, true, `Successfully loaded ${theme} theme`);
                    
                    // Simulate theme change in this test page
                    if (theme === 'dark') {
                        document.documentElement.classList.remove('light');
                        document.documentElement.classList.add('dark');
                    } else if (theme === 'light') {
                        document.documentElement.classList.remove('dark');
                        document.documentElement.classList.add('light');
                    } else {
                        // Auto - use system preference
                        const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                        document.documentElement.classList.remove('light', 'dark');
                        document.documentElement.classList.add(systemTheme);
                    }
                    
                    // Save to localStorage to simulate persistence
                    localStorage.setItem('kogoro-theme', theme);
                    
                    updateThemeStatus();
                    
                    // Check if theme applied correctly
                    setTimeout(() => {
                        const hasCorrectClass = document.documentElement.classList.contains(
                            theme === 'auto' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : theme
                        );
                        
                        addTestResult(`Theme Apply (${theme})`, hasCorrectClass, 
                            hasCorrectClass ? 'Theme classes applied correctly' : 'Theme classes not applied');
                    }, 100);
                    
                } else {
                    addTestResult(`Theme Switch (${theme})`, false, `HTTP ${response.status}: ${response.statusText}`);
                }
            } catch (error) {
                addTestResult(`Theme Switch (${theme})`, false, error.message);
            }
        }

        async function testPersistence() {
            console.log('Testing theme persistence...');
            
            try {
                // Save current theme
                const originalTheme = localStorage.getItem('kogoro-theme');
                
                // Set a test theme
                localStorage.setItem('kogoro-theme', 'dark');
                
                // Simulate page reload by checking if theme persists
                setTimeout(() => {
                    const persistedTheme = localStorage.getItem('kogoro-theme');
                    const persistenceWorks = persistedTheme === 'dark';
                    
                    addTestResult('Theme Persistence', persistenceWorks, 
                        persistenceWorks ? 'Theme persists in localStorage' : 'Theme not persisted');
                    
                    // Restore original theme
                    if (originalTheme) {
                        localStorage.setItem('kogoro-theme', originalTheme);
                    } else {
                        localStorage.removeItem('kogoro-theme');
                    }
                    
                    updateThemeStatus();
                }, 100);
                
            } catch (error) {
                addTestResult('Theme Persistence', false, error.message);
            }
        }

        async function runAllTests() {
            console.log('Running comprehensive theme tests...');
            
            // Clear previous results
            document.getElementById('test-results').innerHTML = '';
            
            // Test 1: Default theme
            try {
                const response = await makeRequest(SERVER_URL);
                const isDefaultLight = response.ok && !response.text.includes('dark');
                addTestResult('Default Theme (Light)', isDefaultLight, 
                    isDefaultLight ? 'Server responds with light theme by default' : 'Default theme not light');
            } catch (error) {
                addTestResult('Default Theme (Light)', false, error.message);
            }
            
            // Test 2: All themes
            await testTheme('light');
            await new Promise(resolve => setTimeout(resolve, 500));
            
            await testTheme('dark');
            await new Promise(resolve => setTimeout(resolve, 500));
            
            await testTheme('auto');
            await new Promise(resolve => setTimeout(resolve, 500));
            
            // Test 3: Persistence
            await testPersistence();
            
            // Generate final report
            setTimeout(() => {
                const passedTests = Object.values(testResults).filter(v => v === true).length;
                const totalTests = Object.keys(testResults).filter(k => k !== 'errors').length;
                
                const reportDiv = document.createElement('div');
                reportDiv.className = 'mt-8 p-4 rounded-lg bg-blue-50 border border-blue-200';
                reportDiv.innerHTML = `
                    <h3 class="text-lg font-semibold mb-2">Final Report</h3>
                    <p><strong>Tests Passed:</strong> ${passedTests}/${totalTests}</p>
                    <p><strong>Status:</strong> ${passedTests === totalTests ? '✅ ALL TESTS PASSED' : '⚠️ SOME TESTS FAILED'}</p>
                    ${testResults.errors.length > 0 ? `<p><strong>Errors:</strong><br>${testResults.errors.join('<br>')}</p>` : ''}
                `;
                
                document.getElementById('test-results').appendChild(reportDiv);
            }, 1000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateThemeStatus();
            
            // Listen for system theme changes
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateThemeStatus);
            
            // Run tests automatically
            setTimeout(runAllTests, 1000);
        });
    </script>
</body>
</html>
