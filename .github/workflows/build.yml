name: Build and Upload

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-gui:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            platform: darwin
          - os: ubuntu-latest
            arch: x64
            platform: linux
          - os: ubuntu-24.04-arm
            arch: arm64
            platform: linux
          - os: windows-latest
            arch: x64
            platform: win32
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev cmake

      - name: Install MSVC tools
        if: matrix.platform == 'win32'
        uses: ilammy/msvc-dev-cmd@v1

      - run: bun install

      - name: Build GUI
        working-directory: apps/gui
        run: bun run build:bin

      - name: Upload GUI artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} apps/gui/artifacts/* --clobber

  build-cli:
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            os: macos-latest
            name: kogoro-darwin-arm64
          - target: bun-linux-x64
            os: ubuntu-latest
            name: kogoro-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-24.04-arm
            name: kogoro-linux-arm64
          - target: bun-windows-x64
            os: windows-latest
            name: kogoro-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Build CLI
        working-directory: apps/cli
        run: bun run build:bin
        env:
          TARGET: ${{ matrix.target }}
          OUTFILE: ${{ matrix.name }}

      - name: Upload CLI artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} apps/cli/dist/${{ matrix.name }} --clobber
