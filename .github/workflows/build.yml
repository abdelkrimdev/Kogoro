name: Build and Upload

on:
  push:
    tags: ["v*"]

jobs:
  build-gui:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            platform: darwin
          - os: macos-13
            arch: x64
            platform: darwin
          - os: ubuntu-latest
            arch: x64
            platform: linux
          - os: ubuntu-24.04-arm
            arch: arm64
            platform: linux
          - os: windows-latest
            arch: x64
            platform: win32
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev cmake

      - name: Install MSVC tools
        if: matrix.platform == 'win32'
        uses: ilammy/msvc-dev-cmd@v1

      - run: bun install

      - name: Build GUI
        working-directory: apps/gui
        run: bunx electrobun build --env=stable

      - name: Upload GUI artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} apps/gui/artifacts/* --clobber

  build-cli:
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            os: macos-latest
            ext: ""
          - target: bun-darwin-x64
            os: macos-13
            ext: ""
          - target: bun-linux-x64
            os: ubuntu-latest
            ext: ""
          - target: bun-linux-arm64
            os: ubuntu-24.04-arm
            ext: ""
          - target: bun-windows-x64
            os: windows-latest
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Build CLI
        working-directory: apps/cli
        run: bun build --compile --target ${{ matrix.target }} src/index.ts --outfile dist/kogoro${{ matrix.ext }}

      - name: Upload CLI artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} apps/cli/dist/kogoro${{ matrix.ext }} --clobber
