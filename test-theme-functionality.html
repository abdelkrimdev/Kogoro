<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Test - Kogoro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Theme variables - same as in main.css */
        :root {
            /* Light theme */
            --bg-primary: 255 255 255;
            --bg-secondary: 249 250 251;
            --bg-tertiary: 243 244 246;

            --text-primary: 17 24 39;
            --text-secondary: 75 85 99;
            --text-tertiary: 156 163 175;

            --border-primary: 229 231 235;
            --border-secondary: 209 213 219;
            --border-tertiary: 229 231 235;

            --accent: 59 130 246;
            --accent-hover: 37 99 235;
        }

        .dark {
            /* Dark theme */
            --bg-primary: 17 24 39;
            --bg-secondary: 31 41 55;
            --bg-tertiary: 55 65 81;

            --text-primary: 243 244 246;
            --text-secondary: 156 163 175;
            --text-tertiary: 107 114 128;

            --border-primary: 55 65 81;
            --border-secondary: 75 85 99;
            --border-tertiary: 75 85 99;

            --accent: 59 130 246;
            --accent-hover: 96 165 250;
        }

        body {
            background-color: rgb(var(--bg-primary));
            color: rgb(var(--text-primary));
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .card {
            background-color: rgb(var(--bg-secondary));
            border: 1px solid rgb(var(--border-primary));
            color: rgb(var(--text-primary));
        }

        .text-secondary {
            color: rgb(var(--text-secondary));
        }

        .text-tertiary {
            color: rgb(var(--text-tertiary));
        }

        .accent {
            color: rgb(var(--accent));
        }

        .debug-info {
            font-family: monospace;
            font-size: 12px;
            background: rgba(0,0,0,0.1);
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        <h1 class="text-3xl font-bold mb-6">Theme Functionality Test</h1>
        
        <!-- Theme Toggle -->
        <div class="mb-6">
            <button onclick="toggleTheme()" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                Toggle Theme (Current: <span id="current-theme">light</span>)
            </button>
            <button onclick="setTheme('light')" class="ml-2 px-4 py-2 bg-gray-200 text-gray-800 rounded hover:bg-gray-300">
                Set Light
            </button>
            <button onclick="setTheme('dark')" class="ml-2 px-4 py-2 bg-gray-800 text-white rounded hover:bg-gray-700">
                Set Dark
            </button>
        </div>

        <!-- Test Cards -->
        <div class="card p-6 rounded-lg">
            <h2 class="text-xl font-semibold mb-4">Dashboard Component Simulation</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="card p-4 rounded">
                    <h3 class="text-secondary text-sm font-medium">Total Anime</h3>
                    <p class="text-2xl font-bold">42</p>
                    <p class="text-tertiary text-xs">+2 this week</p>
                </div>
                <div class="card p-4 rounded">
                    <h3 class="text-secondary text-sm font-medium">Episodes</h3>
                    <p class="text-2xl font-bold">156</p>
                    <p class="text-tertiary text-xs">+12 this week</p>
                </div>
                <div class="card p-4 rounded">
                    <h3 class="text-secondary text-sm font-medium">Watched</h3>
                    <p class="text-2xl font-bold">89</p>
                    <p class="text-tertiary text-xs">+5 this week</p>
                </div>
                <div class="card p-4 rounded">
                    <h3 class="text-secondary text-sm font-medium">Favorites</h3>
                    <p class="text-2xl font-bold">12</p>
                    <p class="text-tertiary text-xs">+1 this week</p>
                </div>
            </div>
        </div>

        <!-- Debug Information -->
        <div class="debug-info">
            <h3 class="font-bold mb-2">Debug Information:</h3>
            <div id="debug-output"></div>
        </div>

        <!-- CSS Variables Display -->
        <div class="card p-6 rounded-lg">
            <h3 class="text-xl font-semibold mb-4">Current CSS Variables</h3>
            <div id="css-variables" class="grid grid-cols-2 gap-4 font-mono text-sm"></div>
        </div>
    </div>

    <script>
        function getComputedCSSVariables() {
            const styles = getComputedStyle(document.documentElement);
            const variables = {};
            
            // List of CSS variables to check
            const varNames = [
                '--bg-primary', '--bg-secondary', '--bg-tertiary',
                '--text-primary', '--text-secondary', '--text-tertiary',
                '--border-primary', '--border-secondary', '--border-tertiary',
                '--accent', '--accent-hover'
            ];
            
            varNames.forEach(varName => {
                variables[varName] = styles.getPropertyValue(varName).trim();
            });
            
            return variables;
        }

        function updateDebugInfo() {
            const currentTheme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
            document.getElementById('current-theme').textContent = currentTheme;
            
            const debugOutput = document.getElementById('debug-output');
            debugOutput.innerHTML = `
                <p><strong>Current Theme:</strong> ${currentTheme}</p>
                <p><strong>HTML Classes:</strong> ${document.documentElement.className}</p>
                <p><strong>Body Background:</strong> ${getComputedStyle(document.body).backgroundColor}</p>
                <p><strong>Body Color:</strong> ${getComputedStyle(document.body).color}</p>
                <p><strong>System Preference:</strong> ${window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'}</p>
            `;
            
            const cssVariables = getComputedCSSVariables();
            const cssVarsOutput = document.getElementById('css-variables');
            cssVarsOutput.innerHTML = Object.entries(cssVariables)
                .map(([name, value]) => `<div><strong>${name}:</strong> ${value}</div>`)
                .join('');
        }

        function setTheme(theme) {
            document.documentElement.classList.remove('light', 'dark');
            if (theme !== 'light') {
                document.documentElement.classList.add(theme);
            }
            localStorage.setItem('theme', theme);
            updateDebugInfo();
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            setTheme(newTheme);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Load saved theme or default to light
            const savedTheme = localStorage.getItem('theme') || 'light';
            setTheme(savedTheme);
            
            // Update debug info every second to catch changes
            setInterval(updateDebugInfo, 1000);
            updateDebugInfo();
        });

        // Listen for system theme changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            console.log('System theme changed to:', e.matches ? 'dark' : 'light');
            updateDebugInfo();
        });
    </script>
</body>
</html>
