<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Debug</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        border: 'rgb(var(--border-primary))',
                        background: 'rgb(var(--bg-primary))',
                        foreground: 'rgb(var(--text-primary))',
                        muted: {
                            DEFAULT: 'rgb(var(--bg-secondary))',
                            foreground: 'rgb(var(--text-secondary))',
                        },
                        tertiary: {
                            DEFAULT: 'rgb(var(--bg-tertiary))',
                            foreground: 'rgb(var(--text-tertiary))',
                            border: 'rgb(var(--border-tertiary))',
                        },
                        accent: {
                            DEFAULT: 'rgb(var(--accent))',
                            foreground: 'rgb(var(--bg-primary))',
                            hover: 'rgb(var(--accent-hover))',
                        },
                    },
                },
            },
        }
    </script>
    <style>
        :root {
            /* Light theme */
            --bg-primary: 255 255 255;
            --bg-secondary: 249 250 251;
            --bg-tertiary: 243 244 246;
            --text-primary: 17 24 39;
            --text-secondary: 75 85 99;
            --text-tertiary: 156 163 175;
            --border-primary: 229 231 235;
            --border-secondary: 209 213 219;
            --border-tertiary: 229 231 235;
            --accent: 59 130 246;
            --accent-hover: 37 99 235;
        }

        .dark {
            /* Dark theme */
            --bg-primary: 17 24 39;
            --bg-secondary: 31 41 55;
            --bg-tertiary: 55 65 81;
            --text-primary: 243 244 246;
            --text-secondary: 156 163 175;
            --text-tertiary: 107 114 128;
            --border-primary: 55 65 81;
            --border-secondary: 75 85 99;
            --border-tertiary: 75 85 99;
            --accent: 59 130 246;
            --accent-hover: 96 165 250;
        }

        body {
            background-color: rgb(var(--bg-primary));
            color: rgb(var(--text-primary));
        }
    </style>
</head>
<body class="bg-background text-foreground">
    <div class="p-8">
        <h1 class="text-2xl font-bold mb-4">Theme Debug Test</h1>
        
        <div class="space-y-4">
            <div class="p-4 bg-muted border rounded">
                <p class="text-muted-foreground">This should use muted background</p>
            </div>
            
            <div class="p-4 bg-accent text-accent-foreground rounded">
                <p>This should use accent colors</p>
            </div>
            
            <div class="p-4 border border-border rounded">
                <p class="text-tertiary-foreground">This should use tertiary colors</p>
            </div>
        </div>

        <div class="mt-8 space-x-4">
            <button onclick="document.documentElement.classList.remove('dark')" class="px-4 py-2 bg-accent text-accent-foreground rounded">
                Light Mode
            </button>
            <button onclick="document.documentElement.classList.add('dark')" class="px-4 py-2 bg-accent text-accent-foreground rounded">
                Dark Mode
            </button>
        </div>

        <div class="mt-4">
            <p>Current theme: <span id="current-theme">light</span></p>
            <p>CSS Variables:</p>
            <pre id="css-vars"></pre>
        </div>
    </div>

    <script>
        function updateThemeInfo() {
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('current-theme').textContent = isDark ? 'dark' : 'light';
            
            const style = getComputedStyle(document.documentElement);
            const vars = {
                '--bg-primary': style.getPropertyValue('--bg-primary'),
                '--text-primary': style.getPropertyValue('--text-primary'),
                '--border-primary': style.getPropertyValue('--border-primary'),
            };
            
            document.getElementById('css-vars').textContent = JSON.stringify(vars, null, 2);
        }

        updateThemeInfo();
        
        // Watch for theme changes
        const observer = new MutationObserver(updateThemeInfo);
        observer.observe(document.documentElement, {
            attributes: true,
            attributeFilter: ['class']
        });
    </script>
</body>
</html>
